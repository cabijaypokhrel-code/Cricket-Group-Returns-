name: Deploy to UAT

on:
  push:
    branches: [uat]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-uat
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages (UAT)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          target-folder: uat
          clean: true
