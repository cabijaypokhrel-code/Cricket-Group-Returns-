<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturday Cricket Team Scorer</title>
<style>
/* CSS STYLES */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f0;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:12px}
.header{background:#0F6E56;color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:15px}
.header-text h1{font-size:20px;font-weight:600;margin-bottom:2px}
.header-text p{font-size:13px;opacity:.8;font-style:italic}
.logo-img{width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);object-fit:cover}
.scoreboard{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px;margin-bottom:12px}
.score-main{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.score-runs{font-size:52px;font-weight:600;color:#1a1a1a;line-height:1}
.score-info{text-align:right}
.score-overs{font-size:15px;color:#666}
.score-rr{font-size:13px;color:#888}
.team-names{display:flex;justify-content:space-between;margin-bottom:8px}
.team-name{font-size:14px;font-weight:600;color:#1a1a1a}
.target-bar{font-size:13px;color:#666;margin-bottom:12px;padding:8px;background:#f7f7f5;border-radius:8px}
.this-over{margin-top:10px}
.over-label{font-size:12px;color:#888;margin-bottom:6px}
.balls-row{display:flex;gap:6px;flex-wrap:wrap}
.ball{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:1px solid #ddd}
.ball-0{background:#f0f0ee;color:#555}
.ball-1,.ball-2,.ball-3{background:#E1F5EE;color:#0F6E56}
.ball-4{background:#E6F1FB;color:#0C447C}
.ball-6{background:#EEEDFE;color:#3C3489}
.ball-W{background:#FCEBEB;color:#791F1F}
.ball-WD,.ball-NB{background:#FAEEDA;color:#633806}
.ball-empty{background:#f7f7f5;border:1px dashed #ccc}
.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.tab{padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;white-space:nowrap;flex-shrink:0}
.tab.active{background:#0F6E56;color:#fff;border-color:#0F6E56}
.scorecard-table{width:100%;font-size:13px;border-collapse:collapse}
.scorecard-table th{text-align:left;font-weight:600;font-size:12px;color:#888;padding:6px 8px;border-bottom:1px solid #eee}
.scorecard-table td{padding:7px 8px;border-bottom:1px solid #eee;color:#1a1a1a}
.scorecard-table td:last-child,.scorecard-table th:last-child{text-align:right}
.scoring-panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px;margin-bottom:12px}
.btn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.btn{padding:14px 4px;border-radius:10px;border:1px solid #ddd;cursor:pointer;font-size:16px;font-weight:600;background:#fff;color:#1a1a1a;touch-action:manipulation;transition:transform .1s}
.btn:active{transform:scale(.93);background:#f0f0ee}
.btn-4{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.btn-6{background:#EEEDFE;color:#3C3489;border-color:#CECBF6}
.btn-W{background:#FCEBEB;color:#791F1F;border-color:#F7C1C1}
.btn-wd{background:#FAEEDA;color:#633806;border-color:#FAC775}
.btn-primary{width:100%;padding:14px;background:#0F6E56;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px}
.ca-credit{position:fixed;top:10px;right:14px;font-size:11px;font-weight:600;color:#0F6E56;opacity:.75;background:rgba(255,255,255,.7);padding:3px 7px;border-radius:6px;border:1px solid #c8e8df}
/* Simplification for full code brevity */
.hidden{display:none}
</style>
</head>
<body>

<div class="ca-credit">★ CA Bijay Pokhrel</div>

<div class="app">
  <div class="header">
    <img class="logo-img" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAYAAADnB4B+AAAACXBIWXMAAAsTAAALEwEAmpwYAAAA..." alt="Logo">
    <div class="header-text">
      <h1>Saturday Cricket Team</h1>
      <p>Weekend Warriors</p>
    </div>
  </div>

  <div id="setup" class="setup-panel card">
    <h3>New Match Setup</h3>
    <div class="form-group">
      <label>Match Title</label>
      <input type="text" id="match-title-input" value="Weekend Warriors Match">
    </div>
    <div class="form-group">
        <label>Overs</label>
        <input type="number" id="match-overs" value="20">
    </div>
    <button class="btn-primary" onclick="startMatch()">Start Match</button>
  </div>

  <div id="scorer" class="hidden">
    <div class="scoreboard">
        <div class="team-names">
            <span class="team-name">Warriors</span>
            <span class="team-name">Opponents</span>
        </div>
        <div class="score-main">
            <div class="score-runs" id="display-score">0/0</div>
            <div class="score-info">
                <div class="score-overs" id="display-overs">Overs: 0.0</div>
            </div>
        </div>
    </div>

    <div class="scoring-panel">
        <div class="btn-grid">
            <button class="btn" onclick="addRuns(0)">0</button>
            <button class="btn" onclick="addRuns(1)">1</button>
            <button class="btn" onclick="addRuns(2)">2</button>
            <button class="btn" onclick="addRuns(3)">3</button>
            <button class="btn btn-4" onclick="addRuns(4)">4</button>
            <button class="btn btn-6" onclick="addRuns(6)">6</button>
            <button class="btn btn-W" onclick="out()">W</button>
            <button class="btn btn-wd" onclick="extra('WD')">WD</button>
        </div>
        <button class="btn-primary" style="background:#888" onclick="reset()">Reset Match</button>
    </div>
  </div>
</div>

<script>
/* JAVASCRIPT LOGIC */
let state = {
    runs: 0,
    wickets: 0,
    balls: 0,
    overs: 0
};

function startMatch() {
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('scorer').classList.remove('hidden');
}

function updateDisplay() {
    let ov = Math.floor(state.balls / 6);
    let rem = state.balls % 6;
    document.getElementById('display-score').innerText = `${state.runs}/${state.wickets}`;
    document.getElementById('display-overs').innerText = `Overs: ${ov}.${rem}`;
}

function addRuns(r) {
    state.runs += r;
    state.balls++;
    updateDisplay();
}

function extra(type) {
    state.runs += 1; // Wide/No ball 1 run
    updateDisplay();
}

function out() {
    state.wickets++;
    state.balls++;
    updateDisplay();
}

function reset() {
    if(confirm("Reset all scores?")) {
        state = {runs: 0, wickets: 0, balls: 0, overs: 0};
        updateDisplay();
        document.getElementById('setup').classList.remove('hidden');
        document.getElementById('scorer').classList.add('hidden');
    }
}
</script>

</body>
</html>
