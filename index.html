<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturday Cricket Team</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F6E56">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cricket">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- ✅ STEP 2: Link external CSS file -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ca-credit">&#9733; CA Bijay Pokhrel</div>
  <div class="app">
    <div class="header">
      <h1 id="match-title" class="header-title">
        <img id="header-logo" src="" alt="Team Logo">
      </h1>
      <p id="match-subtitle">Set up a new match to begin</p>
    </div>
    <div id="main-content"></div>
  </div>

  <script>
    /**
     * Team logo as base64 PNG
     * @type {string}
     */
    const TEAM_LOGO = "data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA";

    /**
     * Global application state
     * Maintains match data, scoring, and UI state
     */
    var S = {
      phase: 'setup',
      match: { team1: '', team2: '', overs: 20, batFirst: '' },
      innings: 1,
      t1: { runs: 0, wickets: 0, balls: 0, wide: 0, nb: 0, byes: 0, legbyes: 0 },
      t2: { runs: 0, wickets: 0, balls: 0, wide: 0, nb: 0, byes: 0, legbyes: 0 },
      batting: [],
      bowling: [],
      strikerIdx: 0,
      nonStrikerIdx: 1,
      bowlerIdx: 0,
      thisBalls: [],
      overHistory: [],
      overBowlers: [],
      fow: [],
      partnershipBreaks: [],
      wicketPending: false,
      outIdx: -1,
      overDone: false,
      editStriker: false,
      editBowler: false,
      extrasPanel: null,
      activeTab: 'live',
      snapshots: [],
      inn1batting: [],
      inn1bowling: [],
      inn1fow: [],
      inn1overHistory: [],
      inn1score: null,
      battingOrder: [],
      inn1battingOrder: [],
      bowlingOrder: [],
      inn1bowlingOrder: [],
      bowlerConfirmed: false,
      dismissalPending: false,
      dismissalType: '',
      thisBallsRunout: [],
      confirmEndInnings: false,
      inn1Complete: false,
      prefillPlayers: null,
      choosePlayersPhase: false
    };

    /**
     * Save current state to undo stack
     * Stores max 50 snapshots for memory efficiency
     */
    function saveSnapshot() {
      S.snapshots.push(JSON.stringify({
        t1: S.t1, t2: S.t2,
        batting: S.batting, bowling: S.bowling,
        strikerIdx: S.strikerIdx, nonStrikerIdx: S.nonStrikerIdx, bowlerIdx: S.bowlerIdx,
        thisBalls: S.thisBalls, thisBallsRunout: S.thisBallsRunout.slice(), overHistory: S.overHistory, overBowlers: S.overBowlers.slice(), fow: S.fow, battingOrder: S.battingOrder.slice(), bowlingOrder: S.bowlingOrder.slice(),
        wicketPending: S.wicketPending, outIdx: S.outIdx,
        overDone: S.overDone, innings: S.innings
      }));
      if (S.snapshots.length > 50) S.snapshots.shift();
    }

    /**
     * Undo last action by restoring previous snapshot
     */
    function undoLast() {
      if (!S.snapshots.length) return;
      var prev = JSON.parse(S.snapshots.pop());
      S.t1 = prev.t1; S.t2 = prev.t2;
      S.batting = prev.batting; S.bowling = prev.bowling;
      S.strikerIdx = prev.strikerIdx; S.nonStrikerIdx = prev.nonStrikerIdx; S.bowlerIdx = prev.bowlerIdx;
      S.thisBalls = prev.thisBalls; S.thisBallsRunout = prev.thisBallsRunout || []; S.overHistory = prev.overHistory; S.overBowlers = prev.overBowlers || []; S.fow = prev.fow;
      S.wicketPending = prev.wicketPending; S.outIdx = prev.outIdx;
      S.overDone = prev.overDone; S.innings = prev.innings;
      S.battingOrder = prev.battingOrder || S.battingOrder;
      S.bowlingOrder = prev.bowlingOrder || S.bowlingOrder;
      S.extrasPanel = null; S.editStriker = false; S.editBowler = false; S.confirmEndInnings = false;
      render();
    }

    // =============== Helper Functions ===============
    function sc() { return S.innings === 1 ? S.t1 : S.t2; }
    function bat() { return S.batting[S.strikerIdx]; }
    function ns() { return S.batting[S.nonStrikerIdx]; }
    function bowl() { return S.bowling[S.bowlerIdx]; }
    function legalCount() { return S.thisBalls.filter(function(b) { return !b.startsWith('WD') && !b.startsWith('NB'); }).length; }
    function overs(s) { return Math.floor(s.balls / 6) + '.' + (s.balls % 6); }
    function rr(s) { return s.balls === 0 ? '0.00' : (s.runs / (s.balls / 6)).toFixed(2); }
    function target() { return S.innings === 2 ? S.t1.runs + 1 : null; }

    /**
     * Determine ball class for styling
     * @param {string} b - Ball notation
     * @returns {string} CSS class name
     */
    function ballClass(b) {
      if (b === 'W') return 'W';
      if (b.length > 1 && b.endsWith('W')) return 'W'; // run-out with runs e.g. '1W','2W'
      if (b.indexOf('WD') === 0) return 'WD';
      if (b.indexOf('NB') === 0) return 'NB';
      if (b.indexOf('LB') === 0) return 'WD';
      if (b.indexOf('B') === 0) return 'WD';
      if (b === '4') return '4';
      if (b === '6') return '6';
      if (b === '0') return '0';
      return '1';
    }

    function swap() { var t = S.strikerIdx; S.strikerIdx = S.nonStrikerIdx; S.nonStrikerIdx = t; }

    // =============== Scoring Functions ===============
    function doRuns(r) {
      saveSnapshot();
      var s = sc(), b = bat(), w = bowl();
      s.runs += r; b.runs += r; b.balls++; w.runs += r;
      s.balls++; w.balls++;
      if (r === 4) b.fours++;
      if (r === 6) b.sixes++;
      S.thisBalls.push(String(r));
      if (r % 2 === 1) swap();
      if (legalCount() >= 6) endOver();
      if (S.innings === 2 && target() && sc().runs >= target()) endInnings();
      else render();
    }

    function doWide(extra) {
      saveSnapshot();
      var s = sc(), w = bowl(), total = 1 + extra;
      s.runs += total; s.wide += total; w.runs += total;
      S.thisBalls.push(extra > 0 ? 'WD+' + extra : 'WD');
      if (extra % 2 === 1) swap();
      S.extrasPanel = null;
      if (S.innings === 2 && target() && sc().runs >= target()) endInnings();
      else render();
    }

    function doNoBall(extra) {
      saveSnapshot();
      var s = sc(), b = bat(), w = bowl(), total = 1 + extra;
      s.runs += total; s.nb += 1; w.runs += total;
      if (extra > 0) { b.runs += extra; }
      S.thisBalls.push(extra > 0 ? 'NB+' + extra : 'NB');
      if (extra % 2 === 1) swap();
      S.extrasPanel = null;
      if (S.innings === 2 && target() && sc().runs >= target()) endInnings();
      else render();
    }

    function doBye(r) {
      saveSnapshot();
      var s = sc(), w = bowl();
      s.runs += r; s.byes = (s.byes || 0) + r; w.runs += r;
      s.balls++; w.balls++;
      S.thisBalls.push(r > 0 ? 'B+' + r : 'B');
      if (r % 2 === 1) swap();
      S.extrasPanel = null;
      if (legalCount() >= 6) endOver();
      if (S.innings === 2 && target() && sc().runs >= target()) endInnings();
      else render();
    }

    function doLegBye(r) {
      saveSnapshot();
      var s = sc(), w = bowl();
      s.runs += r; s.legbyes = (s.legbyes || 0) + r; w.runs += r;
      s.balls++; w.balls++;
      S.thisBalls.push(r > 0 ? 'LB+' + r : 'LB');
      if (r % 2 === 1) swap();
      S.extrasPanel = null;
      if (legalCount() >= 6) endOver();
      if (S.innings === 2 && target() && sc().runs >= target()) endInnings();
      else render();
    }

    function doWicket() {
      S.dismissalPending = true; S.dismissalType = '';
      render();
    }

    function endOver() {
      S.overHistory.push(S.thisBalls.slice());
      S.overBowlers.push(bowl().name);
      bowl().overs++;
      S.thisBalls = []; S.thisBallsRunout = []; swap(); S.overDone = true;
      if (S.overHistory.length >= S.match.overs) { endInnings(); return; }
    }

    function endInnings() {
      if (S.innings === 1) {
        S.inn1batting = JSON.parse(JSON.stringify(S.batting));
        S.inn1bowling = JSON.parse(JSON.stringify(S.bowling));
        S.inn1fow = JSON.parse(JSON.stringify(S.fow));
        S.inn1overHistory = JSON.parse(JSON.stringify(S.overHistory));
        S.inn1score = JSON.parse(JSON.stringify(S.t1));
        S.inn1battingOrder = S.battingOrder.slice();
        S.inn1bowlingOrder = S.bowlingOrder.slice();
        S.inn1Complete = true;
        render();
      } else {
        S.phase = 'result';
        render();
      }
    }

    /**
     * Initialize second innings
     * Swaps batting and bowling teams
     */
    function startInn2() {
      S.inn1Complete = false;
      S.innings = 2;
      var newBatters = S.inn1bowling.map(function(b) {
        return { name: b.name, runs: 0, balls: 0, fours: 0, sixes: 0, out: false, howOut: '' };
      });
      var newBowlers = S.inn1batting.map(function(b) {
        return { name: b.name, overs: 0, balls: 0, runs: 0, wickets: 0 };
      });
      S.batting = newBatters;
      S.bowling = newBowlers;
      S.strikerIdx = 0; S.nonStrikerIdx = 1; S.bowlerIdx = 0;
      S.battingOrder = [0, 1]; S.bowlingOrder = [];
      S.thisBalls = []; S.overHistory = []; S.overBowlers = []; S.fow = []; S.partnershipBreaks = [];
      S.wicketPending = false; S.overDone = false; S.editStriker = false; S.editBowler = false; S.extrasPanel = null;
      S.snapshots = []; S.bowlerConfirmed = false; S.dismissalPending = false; S.dismissalType = ''; S.thisBallsRunout = [];
      render();
    }

    /**
     * Stub render function
     * Replace with actual UI rendering logic
     */
    function render() {
      console.log('Render called - UI update needed');
    }

    /**
     * Initialize the application
     */
    function init() {
      console.log('Cricket Scoring App Initialized');
      console.log('✅ External CSS loaded from styles.css');
    }

    // Start the app when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
